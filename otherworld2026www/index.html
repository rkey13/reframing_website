<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otherworld 2026 - Schedule</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #050b05;
            --text-color: #e0e0e0;
            --neon-blue: #00e5ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --neon-yellow: #fffb00;
            --panel-bg: #111a12;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 20px; }
        
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button { background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 8px 15px; cursor: pointer; border-radius: 5px; }
        button.active { background: var(--neon-blue); color: var(--bg-color); font-weight: bold; }
        #btn-now { border-color: var(--neon-yellow); color: var(--neon-yellow); }
        #btn-now:hover { background: var(--neon-yellow); color: var(--bg-color); }

        .table-container { width: 100%; max-width: 1400px; margin: auto; overflow-x: auto; background: var(--panel-bg); padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background-color: rgba(0, 229, 255, 0.1); color: var(--neon-blue); padding: 12px; text-align: left; border-bottom: 2px solid var(--neon-blue); text-transform: uppercase; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #1f2e1f; vertical-align: top; font-size: 14px; }

        .past-event { opacity: 0.45; filter: grayscale(0.2); }
        .past-event td { color: #aaa; }

        .day-col { color: var(--neon-green); font-weight: bold; }
        .camp-col { color: var(--neon-pink); font-weight: bold; }
        .title-col { color: var(--neon-yellow); font-weight: bold; }
        .hood-cell { font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">This is a mirror of the Rogue Raccoon When/Where/What (Not to be confused with the official What/Where/When) this was last updated May 25 2026 @ 22:01</h1>
    
    <div class="controls">
        <button id="btn-time" class="active" onclick="sortData('time')">Sort by Date & Time</button>
        <button id="btn-camp" onclick="sortData('camp')">Sort by Camp</button>
        <button id="btn-hood" onclick="sortData('hood')">Sort by Location</button>
        <button id="btn-now" onclick="jumpToNow()">Jump to Now</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Day</th>
                    <th>Time</th>
                    <th>Camp</th>
                    <th>Neighbourhood</th>
                    <th>Event</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody id="events-body">
                <tr><td colspan="6">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const CSV_FILE = "Otherworld_2026_Events.csv";
        let allEvents = [];
        const tbody = document.getElementById('events-body');

        // Neighborhood Color Map
        const hoodColors = {
            "SPARK": "#FF9933", "ASHLAND": "#A9A9A9", "BLACK ROCK": "#696969",
            "BROOD": "#800080", "COLLECTION": "#FF69B4", "CONDENSATION": "#00FFFF",
            "DOACRACY": "#FFFF00", "EVAPORATION": "#ADD8E6", "KINDLE": "#FF00FF",
            "MIDDLE EARTH": "#8B4513", "MOOP": "#39FF14", "PRECIPITATION": "#4169E1",
            "ROAMING": "#D3D3D3", "SANDSTORM": "#F4A460", "SCORCH": "#FF4500",
            "SIDEQUEST": "#9370DB", "SMOLDER": "#FF4444", "SOMEWHERE": "#FFFFFF",
            "TINKER": "#7FFFD4", "YES.. AND?": "#00FF7F"
        };

        const dateMap = { "Thursday": "2026-06-04", "Friday": "2026-06-05", "Saturday": "2026-06-06", "Sunday": "2026-06-07", "Monday": "2026-06-08" };
        const dayOrder = { "Thursday": 1, "Friday": 2, "Saturday": 3, "Sunday": 4, "Monday": 5 };

        function isPast(dayStr, endTimeStr) {
            const dateStr = dateMap[dayStr];
            if (!dateStr || !endTimeStr) return false;
            const eventEnd = new Date(`${dateStr}T${endTimeStr}:00`);
            return eventEnd < new Date();
        }

        // --- UPDATED LOADING LOGIC ---
        Papa.parse(CSV_FILE, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                // Filter out empty rows and TRIM all data to fix sorting bugs
                allEvents = results.data.filter(e => e.Day && e.Day.trim() !== "" && e.Day !== "Day")
                    .map(e => ({
                        ...e,
                        Day: (e.Day || "").trim(),
                        Camp: (e.Camp || "").trim(),
                        Neighbourhood: (e.Neighbourhood || "").trim()
                    }));
                sortData('time');
            }
        });

        function sortData(type) {
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            if(type === 'time') document.getElementById('btn-time').classList.add('active');
            if(type === 'camp') document.getElementById('btn-camp').classList.add('active');
            if(type === 'hood') document.getElementById('btn-hood').classList.add('active');

            const sorted = [...allEvents].sort((a, b) => {
                if (type === 'time') {
                    const dayA = dayOrder[a.Day] || 99;
                    const dayB = dayOrder[b.Day] || 99;
                    if (dayA !== dayB) return dayA - dayB;
                    return (a['Start Time'] || "").localeCompare(b['Start Time'] || "");
                } 
                if (type === 'camp') return (a.Camp || "").localeCompare(b.Camp || "");
                if (type === 'hood') return (a.Neighbourhood || "").localeCompare(b.Neighbourhood || "");
            });
            renderTable(sorted);
        }

        function jumpToNow() {
            sortData('time');
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const nowMinutes = now.getHours() * 60 + now.getMinutes();
            const rows = tbody.querySelectorAll('tr');
            let found = false;

            for (let i = 0; i < allEvents.length; i++) {
                const e = allEvents[i];
                const eventDate = dateMap[e.Day];
                if (!eventDate) continue;
                const [h, m] = (e['End Time'] || "00:00").split(':').map(Number);
                const endMinutes = (h * 60) + m;
                if (eventDate >= todayStr) {
                    if (eventDate > todayStr || endMinutes > nowMinutes) {
                        rows[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                        rows[i].style.backgroundColor = "rgba(0, 229, 255, 0.2)";
                        setTimeout(() => rows[i].style.backgroundColor = "", 2000);
                        found = true;
                        break;
                    }
                }
            }
            if (!found) alert("No current or upcoming events!");
        }

        function renderTable(data) {
            tbody.innerHTML = '';
            data.forEach(e => {
                const tr = document.createElement('tr');
                if (isPast(e.Day, e['End Time'])) tr.classList.add('past-event');
                
                const hoodKey = (e.Neighbourhood || "").toUpperCase();
                const hoodColor = hoodColors[hoodKey] || "#ffffff";
                
                tr.innerHTML = `
                    <td class="day-col">${e.Day}</td>
                    <td>${e['Start Time']} - ${e['End Time']}</td>
                    <td class="camp-col">${e.Camp}</td>
                    <td class="hood-cell" style="color: ${hoodColor}">${e.Neighbourhood}</td>
                    <td class="title-col">${e['Event Name']}</td>
                    <td>${e['Description of Event']}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
