<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otherworld 2026 - Schedule</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #050b05;
            --text-color: #e0e0e0;
            --neon-blue: #00e5ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --neon-yellow: #fffb00;
            --panel-bg: #111a12;
        }
        
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 20px; }

        .table-container { 
            width: 100%; 
            max-width: 1400px; 
            margin: auto; 
            overflow-x: auto; 
            background: var(--panel-bg); 
            padding: 20px; 
            border-radius: 10px; 
        }

        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background-color: rgba(0, 229, 255, 0.1); color: var(--neon-blue); padding: 12px; text-align: left; border-bottom: 2px solid var(--neon-blue); text-transform: uppercase; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #1f2e1f; vertical-align: top; font-size: 14px; }

        .day-col { color: var(--neon-green); font-weight: bold; white-space: nowrap; }
        .camp-col { color: var(--neon-pink); font-weight: bold; }
        .title-col { color: var(--neon-yellow); font-weight: bold; }
        .hood-col { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <h1>Otherworld 2026</h1>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Day</th>
                    <th>Time</th>
                    <th>Camp</th>
                    <th>Neighbourhood</th>
                    <th>Event</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody id="events-body">
                <tr><td colspan="6">Loading schedule...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
    // 1. Point directly to your local file
    const CSV_FILE = "Otherworld_2026_Events.csv";
    const tbody = document.getElementById('events-body');

    // 2. Simplified loader
    function loadSchedule() {
        console.log("Loading local file: " + CSV_FILE);
        
        Papa.parse(CSV_FILE, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                if (results.errors.length > 0) {
                    console.error("Errors:", results.errors);
                    tbody.innerHTML = '<tr><td colspan="6" style="color:red;">Parse Error: Check your CSV format.</td></tr>';
                } else {
                    renderTable(results.data);
                }
            },
            error: function(err) {
                tbody.innerHTML = '<tr><td colspan="6" style="color:red;">File Error: Could not find "Otherworld_2026_Events.csv". Check filename capitalization.</td></tr>';
            }
        });
    }

    // 3. Render function
    function renderTable(data) {
        tbody.innerHTML = '';
        data.forEach(e => {
            if(!e['Day']) return; 
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="day-col">${e.Day || ''}</td>
                <td class="time-col">${e['Start Time'] || ''} - ${e['End Time'] || ''}</td>
                <td class="camp-col">${e.Camp || ''}</td>
                <td class="hood-col">${e.Neighbourhood || ''}</td>
                <td class="title-col">${e['Event Name'] || ''}</td>
                <td>${e['Description of Event'] || ''}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 4. Start
    loadSchedule();
</script>
</body>
</html>
