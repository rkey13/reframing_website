<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otherworld 2026 - Schedule</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #050b05;
            --text-color: #e0e0e0;
            --neon-blue: #00e5ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --neon-red: #ff3333;
            --neon-yellow: #fffb00;
            --panel-bg: #111a12;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px;
            padding-top: 75px; /* Offset spacing for the fixed navigation menu bar */
        }
        
        /* --- Persistent Fixed Navigation Header Component --- */
        .sticky-controls-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 54px;
            z-index: 100;
            background-color: #09120a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            box-sizing: border-box;
            padding: 0 12px;
        }

        /* --- Global Instant Search Field Box --- */
        .search-box {
            flex: 1;
            max-width: 400px;
            background: #111a12;
            border: 1px solid var(--neon-blue);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            outline: none;
            min-width: 90px;
            transition: all 0.2s ease-in-out;
            box-sizing: border-box;
        }
        .search-box:focus {
            border-color: var(--neon-yellow);
            box-shadow: 0 0 10px rgba(255, 251, 0, 0.3);
            background: #162418;
        }
        .search-box::placeholder {
            color: rgba(224, 224, 224, 0.4);
            font-weight: normal;
        }

        /* --- Floating Dropdown Menu Card Overlay (With Safari Mobile Scroll Fixes) --- */
        .controls-dropdown {
            display: none;
            position: fixed;
            top: 54px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 650px;
            
            /* iOS Safari Fixes: Prevent cutting off content by defining bounds and enabling inner-scrolling */
            max-height: calc(100vh - 70px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; 
            
            background: var(--panel-bg);
            border: 2px solid var(--neon-blue);
            border-top: none;
            border-radius: 0 0 10px 10px;
            padding: 15px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.9);
            z-index: 99;
            box-sizing: border-box;
        }
        .controls-dropdown.open { display: block; }

        .controls { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        
        /* Collapsible Accordion Core Styles */
        .tags-container { 
            display: none; 
            justify-content: center; 
            gap: 8px; 
            margin-top: 15px;
            padding-top: 15px;
            flex-wrap: wrap; 
            border-top: 1px dashed #223322; 
        }
        .tags-container.open { display: flex; }
        
        button { background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 8px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; transition: all 0.2s; white-space: nowrap; }
        button.active { background: var(--neon-blue); color: var(--bg-color); border-color: var(--neon-blue); }
        
        /* Fixed Bar Main Menu Toggle Styling Rules */
        #bar-btn-controls { border-color: var(--neon-blue); color: var(--neon-blue); }
        #bar-btn-controls.has-filters { border-color: var(--neon-green); color: var(--neon-green); }
        #bar-btn-controls.active { background: var(--neon-blue); color: var(--bg-color); border-color: var(--neon-blue); }
        #bar-btn-controls.active.has-filters { background: var(--neon-green); color: var(--bg-color); border-color: var(--neon-green); }

        /* Dropdown internal matrix trigger button styling rules */
        #btn-toggle-filters { font-size: 14px; border-color: var(--neon-blue); color: var(--neon-blue); }
        #btn-toggle-filters.has-filters { border-color: var(--neon-green); color: var(--neon-green); }
        #btn-toggle-filters.active { background: var(--neon-blue); color: var(--bg-color); border-color: var(--neon-blue); }
        #btn-toggle-filters.active.has-filters { background: var(--neon-green); color: var(--bg-color); border-color: var(--neon-green); }

        /* Special active styling for the Hide Past toggle */
        #btn-toggle-past.active {
            background: var(--neon-red);
            color: var(--bg-color);
            border-color: var(--neon-red);
        }

        #btn-now { border-color: var(--neon-yellow); color: var(--neon-yellow); }
        #btn-now:hover { background: var(--neon-yellow); color: var(--bg-color); }

        /* 3-State Tri-Toggle Button Styles */
        .tag-btn { border-color: #444; color: #888; padding: 5px 12px; font-size: 12px; border-radius: 20px; transition: all 0.2s ease-in-out; }
        .tag-btn.include { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); background: rgba(57, 255, 20, 0.05); }
        .tag-btn.exclude { border-color: var(--neon-red); color: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); background: rgba(255, 51, 51, 0.05); }
        .tag-btn.clear-btn { border-color: #555; color: #aaa; }
        .tag-btn.clear-btn:hover { background: #333; color: #fff; }

        /* Top Map Link Layout Rules */
        .top-actions { text-align: center; margin-bottom: 25px; }
        .map-btn {
            display: inline-block;
            background: transparent;
            color: var(--neon-pink);
            border: 2px solid var(--neon-pink);
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .map-btn:hover { background: var(--neon-pink); color: var(--bg-color); box-shadow: 0 0 20px var(--neon-pink); }

        /* Table & Layout Elements */
        .table-container { width: 100%; max-width: 1400px; margin: auto; background: var(--panel-bg); padding: 20px; border-radius: 10px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: rgba(0, 229, 255, 0.1); color: var(--neon-blue); padding: 12px; text-align: left; border-bottom: 2px solid var(--neon-blue); text-transform: uppercase; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #1f2e1f; vertical-align: top; font-size: 14px; }

        /* Sticky Subheaders aligned below fixed 54px header panel bar */
        tr.sticky-subheader { position: sticky; top: 54px; z-index: 10; }
        tr.sticky-subheader td {
            background: #09120a !important;
            color: var(--neon-blue);
            font-weight: bold;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 12px;
            border-bottom: 2px solid rgba(0, 229, 255, 0.4);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .past-event { opacity: 0.65; }
        .day-col { color: var(--neon-green); font-weight: bold; }
        .camp-col { color: var(--neon-pink); font-weight: bold; }
        .title-col { color: var(--neon-yellow); font-weight: bold; }
        .hood-cell { font-weight: bold; }

        /* --- PHONE & TABLET SCALING OPTIMIZATIONS --- */
        @media (max-width: 768px) {
            body { padding: 10px; padding-top: 70px; }
            h1 { font-size: 18px; }
            
            .sticky-controls-bar { padding: 0 8px; gap: 6px; }
            .sticky-controls-bar button { padding: 8px 10px; font-size: 12px; }
            .search-box { padding: 7px 10px; font-size: 13px; }

            .map-btn { display: block; width: 100%; max-width: 320px; margin: 0 auto; padding: 12px 20px; font-size: 15px; box-sizing: border-box; }

            .controls button { padding: 12px 15px; font-size: 14px; flex: 1 1 auto; text-align: center; }
            .tags-container .tag-btn { padding: 10px 16px; font-size: 14px; border-radius: 25px; margin: 2px; }

            .table-container { padding: 5px; background: transparent; }
            table, tbody, tr, td { display: block; width: 100%; box-sizing: border-box; }
            thead { display: none; }
            
            tr.sticky-subheader { position: sticky; top: 54px; z-index: 20; margin: 15px 0 10px 0; }
            tr.sticky-subheader td { text-align: center; border-radius: 6px; border: 1px solid var(--neon-blue); padding: 12px; box-shadow: 0 4px 12px rgba(0, 225, 255, 0.25); }

            tr.event-row { background: var(--panel-bg); margin-bottom: 12px; border: 1px solid #1f2e1f; border-radius: 8px; padding: 14px; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
            tr.event-row td { padding: 3px 0; border: none; }
            
            .day-col { display: none; }
            .time-cell { font-size: 13px; color: #b5c7b5; font-weight: bold; display: inline-block; margin-right: 10px; }
            .camp-col { font-size: 13px; display: inline-block; margin-right: 10px; }
            .hood-cell { font-size: 13px; display: inline-block; }
            .title-col { font-size: 16px; margin: 6px 0 2px 0; border-top: 1px dashed #223322; padding-top: 6px; }
            .desc-cell { font-size: 13.5px; color: #cccccc; line-height: 1.4; }
        }
    </style>
</head>
<body>

    <div class="sticky-controls-bar">
        <button id="bar-btn-controls" onclick="toggleControlsDropdown()">🎛️ Controls (<span id="active-filter-count-bar">0</span>)</button>
        <input type="text" id="main-search" class="search-box" placeholder="🔍 Search schedule..." oninput="handleSearch(this.value)">
        <button id="btn-now" onclick="jumpToNow()">🕒 Now</button>
    </div>

    <div class="controls-dropdown" id="controls-dropdown">
        <div class="controls">
            <button id="btn-toggle-filters" onclick="toggleFilters()">⚙️ Filter Matrix (<span id="active-filter-count">0</span>)</button>
            <button id="btn-toggle-past" onclick="togglePastEvents()">🙈 Hide Past</button>
            <button id="btn-time" class="active" onclick="setSort('time')">Sort by Date & Time</button>
            <button id="btn-camp" onclick="setSort('camp')">Sort by Camp</button>
            <button id="btn-hood" onclick="setSort('hood')">Sort by Location</button>
        </div>

        <div class="tags-container" id="tags-panel">
            <button class="tag-btn" onclick="cycleTag(this, 'Workshop / Class')">Workshop / Class</button>
            <button class="tag-btn" onclick="cycleTag(this, 'Interactive / Crafts')">Interactive / Crafts</button>
            <button class="tag-btn" onclick="cycleTag(this, 'Food / Drink')">Food / Drink</button>
            <button class="tag-btn" onclick="cycleTag(this, 'Performance / Show')">Performance / Show</button>
            <button class="tag-btn" onclick="cycleTag(this, 'Wellness / Yoga')">Wellness / Yoga</button>
            <button class="tag-btn" onclick="cycleTag(this, 'Refuge / Introspective')">Refuge / Introspective</button>
            <button class="tag-btn" onclick="cycleTag(this, 'Music / Dance')">Music / Dance</button>
            <button class="tag-btn" onclick="cycleTag(this, 'Game / Activity')">Game / Activity</button>
            <button class="tag-btn" onclick="cycleTag(this, '19+')">19+</button>
            <button class="tag-btn" onclick="cycleTag(this, 'Alcohol Involved')">Alcohol Involved</button>
            <button class="tag-btn clear-btn" onclick="clearTags()">Clear Filters</button>
        </div>
    </div>

    <h1 style="text-align: center; margin-top: 10px; font-size: 22px; line-height: 1.3;">Rogue Raccoon When/Where/What Schedule Mirror</h1>
    <p style="text-align: center; margin: -5px 0 25px 0; font-size: 14px;">
        <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vRIakaBzNVNdA3Y6v6ve54-CEKD22Tk4bREgvKI4noaPiqLqqc_YZwdwc2xXOMq0t3Ma6teLoa7p2Rf/pub?output=csv" target="_blank" style="color: var(--neon-blue); text-decoration: none; border-bottom: 1px dashed var(--neon-blue); font-weight: bold;">
            🔗 View Source Google Sheet
        </a>
    </p>
    
    <div class="top-actions">
        <a href="https://otherworld.ca/wp-content/uploads/2026/05/2026_Map.pdf" target="_blank" class="map-btn">
            🗺️ View Event Map (PDF)
        </a>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Day</th>
                    <th>Time</th>
                    <th>Camp</th>
                    <th>Neighbourhood</th>
                    <th>Event</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody id="events-body">
                <tr><td colspan="6">Loading live schedule...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIakaBzNVNdA3Y6v6ve54-CEKD22Tk4bREgvKI4noaPiqLqqc_YZwdwc2xXOMq0t3Ma6teLoa7p2Rf/pub?output=csv";
        
        let allEvents = [];
        let visibleEvents = [];
        let currentSort = 'time';
        let hidePastEvents = false; 
        let searchQuery = "";
        
        let tagStates = {
            'Workshop / Class': 0, 'Interactive / Crafts': 0, 'Food / Drink': 0,
            'Performance / Show': 0, 'Wellness / Yoga': 0, 'Refuge / Introspective': 0,
            'Music / Dance': 0, 'Game / Activity': 0, '19+': 0, 'Alcohol Involved': 0
        };
        
        const tbody = document.getElementById('events-body');

        const hoodColors = {
            "SPARK": "#FF9933", "ASHLAND": "#A9A9A9", "BLACK ROCK": "#696969",
            "BROOD": "#800080", "COLLECTION": "#FF69B4", "CONDENSATION": "#00FFFF",
            "DOACRACY": "#FFFF00", "EVAPORATION": "#ADD8E6", "KINDLE": "#FF00FF",
            "MIDDLE EARTH": "#8B4513", "MOOP": "#39FF14", "PRECIPITATION": "#4169E1",
            "ROAMING": "#D3D3D3", "SANDSTORM": "#F4A460", "SCORCH": "#FF4500",
            "SIDEQUEST": "#9370DB", "SMOLDER": "#FF4444", "SOMEWHERE": "#FFFFFF",
            "TINKER": "#7FFFD4", "YES.. AND?": "#00FF7F"
        };

        const dateMap = { "Thursday": "2026-06-04", "Friday": "2026-06-05", "Saturday": "2026-06-06", "Sunday": "2026-06-07", "Monday": "2026-06-08" };
        const dayOrder = { "Thursday": 1, "Friday": 2, "Saturday": 3, "Sunday": 4, "Monday": 5 };

        function isPast(dayStr, endTimeStr) {
            const dateStr = dateMap[dayStr];
            if (!dateStr || !endTimeStr) return false;
            
            const [year, month, day] = dateStr.split('-').map(Number);
            const [hour, minute] = endTimeStr.split(':').map(Number);
            
            const eventEnd = new Date(year, month - 1, day, hour, minute, 0);
            return eventEnd < new Date();
        }

        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            beforeFirstChunk: function(chunk) {
                var rows = chunk.split(/\r\n|\r|\n/);
                rows.splice(0, 2); 
                return rows.join("\n");
            },
            complete: function(results) {
                allEvents = results.data
                    .filter(e => e.Day && e.Day.trim() !== "" && e.Day !== "Day")
                    .map(e => {
                        const cleaned = {};
                        for (let key in e) {
                            cleaned[key.trim()] = (e[key] || "").trim();
                        }
                        return cleaned;
                    });
                updateDisplay();
            }
        });

        function toggleControlsDropdown() {
            const dropdown = document.getElementById('controls-dropdown');
            const btn = document.getElementById('bar-btn-controls');
            dropdown.classList.toggle('open');
            if(dropdown.classList.contains('open')) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function toggleFilters() {
            const panel = document.getElementById('tags-panel');
            const btn = document.getElementById('btn-toggle-filters');
            panel.classList.toggle('open');
            if(panel.classList.contains('open')) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function togglePastEvents() {
            hidePastEvents = !hidePastEvents;
            const btn = document.getElementById('btn-toggle-past');
            if (hidePastEvents) {
                btn.classList.add('active');
                btn.innerText = "👁️ Show Past";
            } else {
                btn.classList.remove('active');
                btn.innerText = "🙈 Hide Past";
            }
            updateDisplay();
        }

        function handleSearch(val) {
            searchQuery = val.trim();
            updateDisplay();
        }

        function updateFilterCount() {
            let activeCount = 0;
            for (let tag in tagStates) {
                if (tagStates[tag] !== 0) activeCount++;
            }
            document.getElementById('active-filter-count').innerText = activeCount;
            document.getElementById('active-filter-count-bar').innerText = activeCount;
            
            const toggleBtn = document.getElementById('btn-toggle-filters');
            const barBtn = document.getElementById('bar-btn-controls');
            if (activeCount > 0) {
                toggleBtn.classList.add('has-filters');
                barBtn.classList.add('has-filters');
            } else {
                toggleBtn.classList.remove('has-filters');
                barBtn.classList.remove('has-filters');
            }
        }

        function setSort(type) {
            currentSort = type;
            document.querySelectorAll('.controls button').forEach(btn => {
                if (btn.id !== 'btn-toggle-past' && btn.id !== 'btn-toggle-filters') {
                    btn.classList.remove('active');
                }
            });
            if(type === 'time') document.getElementById('btn-time').classList.add('active');
            if(type === 'camp') document.getElementById('btn-camp').classList.add('active');
            if(type === 'hood') document.getElementById('btn-hood').classList.add('active');
            
            if(document.getElementById('tags-panel').classList.contains('open')) {
                document.getElementById('btn-toggle-filters').classList.add('active');
            }
            updateDisplay();
        }

        function cycleTag(btn, tagName) {
            let currentState = tagStates[tagName];
            if (currentState === 0) {
                tagStates[tagName] = 1;
                btn.className = "tag-btn include";
            } else if (currentState === 1) {
                tagStates[tagName] = -1;
                btn.className = "tag-btn exclude";
            } else {
                tagStates[tagName] = 0;
                btn.className = "tag-btn";
            }
            updateDisplay();
        }

        function clearTags() {
            for (let tag in tagStates) tagStates[tag] = 0;
            document.querySelectorAll('.tags-container .tag-btn').forEach(btn => {
                if (!btn.classList.contains('clear-btn')) btn.className = "tag-btn";
            });
            updateDisplay();
        }

        function updateDisplay() {
            let processed = allEvents.filter(e => {
                // 1. Hide Past Filtering
                if (hidePastEvents && isPast(e.Day, e['End Time'])) {
                    return false;
                }

                // 2. Tag Matrix Module Filtering
                for (let tag in tagStates) {
                    const state = tagStates[tag];
                    const isTrue = e[tag] && e[tag].toUpperCase() === 'TRUE';
                    if (state === 1 && !isTrue) return false;  
                    if (state === -1 && isTrue) return false; 
                }

                // 3. Multi-Field Global Input String Search Filtering
                if (searchQuery) {
                    const query = searchQuery.toLowerCase();
                    const nameMatch = (e['Event Name'] || "").toLowerCase().includes(query);
                    const campMatch = (e.Camp || "").toLowerCase().includes(query);
                    const hoodMatch = (e.Neighbourhood || "").toLowerCase().includes(query);
                    const descMatch = (e['Description of Event'] || "").toLowerCase().includes(query);
                    
                    if (!nameMatch && !campMatch && !hoodMatch && !descMatch) {
                        return false;
                    }
                }
                return true;
            });

            // 4. Multi-mode Structured Sorting Execution
            processed.sort((a, b) => {
                if (currentSort === 'time') {
                    const dayA = dayOrder[a.Day] || 99;
                    const dayB = dayOrder[b.Day] || 99;
                    if (dayA !== dayB) return dayA - dayB;
                    return (a['Start Time'] || "").localeCompare(b['Start Time'] || "");
                } 
                if (currentSort === 'camp') return (a.Camp || "").localeCompare(b.Camp || "");
                if (currentSort === 'hood') return (a.Neighbourhood || "").localeCompare(b.Neighbourhood || "");
            });

            visibleEvents = processed;
            updateFilterCount();
            renderTable(processed);
        }

        function jumpToNow() {
            // Auto collapse control overlay if open so user sees destination instantly
            const dropdown = document.getElementById('controls-dropdown');
            if (dropdown.classList.contains('open')) {
                toggleControlsDropdown();
            }

            setSort('time'); 
            const now = new Date();
            
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const todayStr = `${yyyy}-${mm}-${dd}`;
            
            const nowMinutes = now.getHours() * 60 + now.getMinutes();
            const rows = tbody.querySelectorAll('.event-row');
            let found = false;

            for (let i = 0; i < visibleEvents.length; i++) {
                const e = visibleEvents[i];
                const eventDate = dateMap[e.Day];
                if (!eventDate) continue;
                
                const [h, m] = (e['End Time'] || "00:00").split(':').map(Number);
                const endMinutes = (h * 60) + m;
                
                if (eventDate > todayStr) {
                    rows[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    rows[i].style.backgroundColor = "rgba(0, 229, 255, 0.2)";
                    setTimeout(() => rows[i].style.backgroundColor = "", 2000);
                    found = true;
                    break;
                } else if (eventDate === todayStr) {
                    if (endMinutes > nowMinutes) {
                        rows[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                        rows[i].style.backgroundColor = "rgba(0, 229, 255, 0.2)";
                        setTimeout(() => rows[i].style.backgroundColor = "", 2000);
                        found = true;
                        break;
                    }
                }
            }
            if (!found) alert("No matching upcoming visible events found!");
        }

        function renderTable(data) {
            tbody.innerHTML = '';
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#888; padding:30px;">No events found matching those filter selections.</td></tr>`;
                return;
            }
            
            let currentGroupingHeader = "";

            data.forEach(e => {
                let targetGroup = "";
                if (currentSort === 'time') targetGroup = e.Day;
                else if (currentSort === 'camp') targetGroup = e.Camp || "Unspecified Camp";
                else if (currentSort === 'hood') targetGroup = e.Neighbourhood || "Roaming / Global Location";

                if (targetGroup !== currentGroupingHeader) {
                    const headerTr = document.createElement('tr');
                    headerTr.className = "sticky-subheader";
                    headerTr.innerHTML = `<td colspan="6">${targetGroup}</td>`;
                    tbody.appendChild(headerTr);
                    currentGroupingHeader = targetGroup;
                }

                const tr = document.createElement('tr');
                tr.className = "event-row";
                if (isPast(e.Day, e['End Time'])) tr.classList.add('past-event');
                
                const hoodKey = (e.Neighbourhood || "").toUpperCase();
                const hoodColor = hoodColors[hoodKey] || "#ffffff";
                
                tr.innerHTML = `
                    <td class="day-col">${e.Day}</td>
                    <td class="time-cell">🕒 ${e['Start Time']} - ${e['End Time']}</td>
                    <td class="camp-col">⛺ ${e.Camp}</td>
                    <td class="hood-cell" style="color: ${hoodColor}">📍 ${e.Neighbourhood}</td>
                    <td class="title-col">${e['Event Name']}</td>
                    <td class="desc-cell">${e['Description of Event']}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
